name: Documentation CI

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.mdx"
      - "examples/**"
      - tsconfig.examples.json
      - docs.json
      - .github/workflows/docs-ci.yml
  push:
    branches: [main]
    paths:
      - "**/*.mdx"
      - "examples/**"
      - tsconfig.examples.json
      - docs.json
      - .github/workflows/docs-ci.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate navigation JSON
        run: jq empty docs.json

      - name: Check internal links
        run: npx --yes mintlify@4.2.715 broken-links

      - name: Compile security documentation examples
        run: |
          npm ci --ignore-scripts
          npm run typecheck:examples
